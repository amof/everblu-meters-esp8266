; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Pulls in upload_port and upload_flags for env:esp8266_ota. Gitignored, so the
; OTA password stays out of the repository; see platformio_local.ini.example.
; A glob that matches nothing is not an error, so the build still works before
; the file is created.
extra_configs = platformio_local.ini

; Flash over USB. This is the only way to install the first image — OTA cannot
; bootstrap itself — and the recovery path if an OTA image does not come back.
[env:esp8266]
platform = espressif8266
board = nodemcu
framework = arduino
lib_deps = plapointe6/EspMQTTClient@^1.13.3
monitor_speed = 115200
; log2file mirrors the session to .pio/build/esp8266/monitor-*.log. A full sweep
; emits more than the terminal keeps: 61 frequencies, every line echoed back by
; the MQTT mirror and again by the recent-log replay, and a raw capture block on
; top. Scrollback silently drops the beginning, which is where the interesting
; part of a diagnostic run is.
monitor_filters = esp8266_exception_decoder, log2file
build_type = debug
; Regenerates include/version.h from git before each build. See the docstring
; in the script for why it writes a header rather than adding a -D flag.
extra_scripts = pre:scripts/version.py

; Flash over WiFi:
;   pio run -e esp8266_ota -t upload
; Identical firmware, different transport. upload_port and upload_flags come
; from platformio_local.ini; without that file this env fails at upload time
; rather than silently flashing the wrong thing.
[env:esp8266_ota]
extends = env:esp8266
upload_protocol = espota

; Desktop tests. Needs a host C++ compiler on PATH (MinGW-w64 or MSVC);
; the xtensa toolchain cannot be used, it only produces ESP8266 code.
;   pio test -e native
; Compiles the real src/*.cpp against the Arduino fakes in test/fakes, so the
; code under test is the code that gets flashed. See ADR-0003.
[env:native]
platform = native
test_framework = unity
; Link the real sources into the test binary; without this PlatformIO builds
; the test files alone and every reference goes unresolved.
test_build_src = true
; cc1101.cpp is here for the wiring check, which needs no FIFO model and so is
; the cheapest first slice of the fake hardware ADR-0003 describes. The rest of
; that ADR's tiers 1 and 2 are still unbuilt. everblu_cyble.cpp is here for the
; scheduling logic, which decides whether to touch the radio at all and so is
; testable ahead of the FIFO model. everblu_log.cpp comes along because the
; drivers log through it, and eeprom_store.cpp because everblu_cyble.cpp persists
; the meter profile and schedule through it.
build_src_filter = -<*> +<utils.cpp> +<cc1101.cpp> +<everblu_cyble.cpp> +<everblu_log.cpp> +<eeprom_store.cpp>
build_flags =
    -I include
    -I test/fakes
    -std=c++11