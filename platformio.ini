; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp8266]
platform = espressif8266
board = nodemcu
framework = arduino
lib_deps = plapointe6/EspMQTTClient@^1.13.3
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
build_type = debug

; Desktop tests. Needs a host C++ compiler on PATH (MinGW-w64 or MSVC);
; the xtensa toolchain cannot be used, it only produces ESP8266 code.
;   pio test -e native
; Compiles the real src/utils.cpp against the Arduino fakes in test/fakes,
; so the code under test is the code that gets flashed. See ADR-0003.
[env:native]
platform = native
test_framework = unity
; Link the real src/utils.cpp into the test binary; without this PlatformIO
; builds the test files alone and every reference goes unresolved.
test_build_src = true
build_src_filter = -<*> +<utils.cpp>
build_flags =
    -I include
    -I test/fakes
    -std=c++11